modLoader="javafml"

loaderVersion="${loader_version_range}"

license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
logoFile= "icon.png"
credits=""
authors="${mod_authors}"
description='''${mod_description}'''
featureFlags="META-INF/feature_flags.json"

[[mixins]]
config="${mod_id}.mixins.json"

[[accessTransformers]]
file="META-INF/accesstransformer.cfg"

[[dependencies.${mod_id}]]
modId="portingdeadlibs"
type="required"
versionRange="[${pdl_version}, ${pdl_nextMinor})"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="transport_lib"
type="required"
versionRange="[1.0.3]"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="neoforge"
type="required"
versionRange="[${neo_version},)"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="minecraft"
type="required"
versionRange="${minecraft_version_range}"
ordering="NONE"
side="BOTH"
